name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Lint
        run: ruff check src tests scripts
      - name: Type check
        run: mypy src || true
      - name: Tests
        run: pytest
      - name: Smoke dry run
        run: python scripts/run_smoke.py --config configs/smoke.yaml --output-dir experiments/smoke --dry-run
